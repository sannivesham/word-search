<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>సన్నివేశం — పద శోధన ఆట</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Absolute safety styles to make sure grid boxes are forced visible */
    .word-search-container {
      max-width: 600px;
      margin: 20px auto;
      padding: 0 15px;
    }
    #gridContainer {
      display: grid !important;
      gap: 6px;
      background: rgba(201, 162, 75, 0.05);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid rgba(201, 162, 75, 0.2);
      margin-bottom: 20px;
    }
    .word-cell {
      aspect-ratio: 1;
      background: rgba(237, 227, 200, 0.05);
      border: 1px solid rgba(237, 227, 200, 0.1);
      border-radius: 4px;
      color: #EDE3C8;
      font-size: 1.4rem;
      font-weight: bold;
      transition: all 0.2s;
    }
    .word-cell.selecting {
      background: rgba(76, 181, 201, 0.3) !important;
      border-color: #4CB5C9 !important;
    }
    .word-cell.discovered {
      background: rgba(201, 162, 75, 0.25) !important;
      border-color: #C9A24B !important;
      color: #C9A24B !important;
    }
    .word-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .word-bank-item {
      padding: 6px 14px;
      background: rgba(237, 227, 200, 0.05);
      border: 1px solid rgba(237, 227, 200, 0.2);
      border-radius: 20px;
      color: rgba(237, 227, 200, 0.6);
      font-size: 1.1rem;
    }
    .word-bank-item.found {
      text-decoration: line-through;
      color: #C9A24B;
      background: rgba(201, 162, 75, 0.1);
      border-color: #C9A24B;
    }
    /* Simple Win Overlay styling */
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 12, 8, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .overlay.hidden { display: none !important; }
    .overlay-content {
      text-align: center;
      background: rgba(25, 20, 15, 0.9);
      padding: 40px;
      border: 1px solid #C9A24B;
      border-radius: 12px;
    }
    .gold-btn {
      background: transparent;
      border: 1px solid #C9A24B;
      color: #C9A24B;
      padding: 10px 24px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 20px;
      border-radius: 4px;
    }
    .gold-btn:hover {
      background: #C9A24B;
      color: #110c08;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="sannivesham-hero">
      <div class="hero-logo-wrapper">
        <div class="hero-emblem">
          <img src="https://sannivesham.com/images/logo.png" alt="Sannivesham Logo" class="emblem-img">
        </div>
      </div>
      <h1 class="main-brand-title">సన్నివేశం</h1>
    </div>

    <header class="site-header" style="position: relative; text-align: center;">
      <div>
        <h2 id="levelTitle">లెవెల్</h2>
        <p class="subtitle" id="levelSubtitle">పద శోధన</p>
      </div>
      <a href="index.html" class="back-link" style="position: absolute; left: 20px; bottom: 12px; color: #4CB5C9; text-decoration: none;">← అన్ని లెవెల్స్</a>
    </header>

    <div class="word-search-container">
      <!-- Matrix Box Target Node -->
      <div id="gridContainer"></div>
      
      <!-- Word Target Checklist -->
      <div id="wordBank" class="word-bank"></div>
    </div>
  </div>

  <!-- Victory Module Window Popup Frame -->
  <div id="winOverlay" class="overlay hidden">
    <div class="overlay-content">
      <h2 style="color: #C9A24B; font-family: 'Cinzel', serif; margin-bottom: 10px;">ధన్యవాదాలు!</h2>
      <p style="color: #EDE3C8;">మీరు అన్ని పదాలను విజయవంతంగా కనుగొన్నారు.</p>
      <button id="nextLevelBtn" class="gold-btn">తదుపరి లెవెల్ →</button>
    </div>
  </div>

  <script src="wordsearch-data.js"></script>
  <script type="module" src="progress.js"></script>
  <script src="game.js"></script>
</body>
</html>
