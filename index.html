<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>సన్నివేశం — పద శోధన (Word Search)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrap">

    <!-- Cinematic Branded Hero Section -->
    <div class="sannivesham-hero">
      <div class="hero-logo-wrapper">
        <div class="hero-emblem">
          <img src="logo.png" alt="Sannivesham Logo" class="emblem-img">
        </div>
      </div>
      
      <h1 class="main-brand-title">సన్నివేశం</h1>
      <p class="main-brand-tagline">సంస్కృతి • సంప్రదాయం • సంభాషణ</p>
    </div>

    <!-- Game Section Header -->
    <header class="site-header">
      <div>
        <h2>పద శోధన (Word Search)</h2>
        <p class="subtitle">అక్షరాల గడులలో దాగివున్న ఇతిహాస పదాలను కనుగొనండి.</p>
      </div>
    </header>

    <!-- Dynamic Level Selection Grid Container -->
    <div id="levelGrid" class="level-grid"></div>

  </div>

  <!-- Game Scripts Layer -->
  <script src="levels.js"></script>
  <script src="progress.js"></script>
  <script src="level-select.js"></script>
</body>
</html>
